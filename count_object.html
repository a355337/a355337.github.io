<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法數字樂園 - 雙語挑戰升級版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+TC:wght=500;700;900&display=swap');
        
        body {
            font-family: 'Noto Sans TC', 'Fredoka One', sans-serif;
            background: linear-gradient(135deg, #FFF9E6 0%, #E8F5E9 100%);
            touch-action: manipulation;
        }

        /* 可愛漂浮動畫 */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(2deg); }
        }

        .float-item {
            animation: float 4s ease-in-out infinite;
        }

        /* 氣球飄起動畫 */
        @keyframes balloonUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(15deg); opacity: 1; }
        }

        .balloon {
            position: absolute;
            animation: balloonUp 6.5s linear infinite;
            cursor: pointer;
        }

        /* 快樂彈跳 */
        @keyframes bounce-custom {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
        .bounce-active {
            animation: bounce-custom 0.5s ease-in-out;
        }

        /* 卡片左右搖晃 (答錯時) */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake-active {
            animation: shake 0.4s ease-in-out;
        }

        /* 紙花特效畫布 */
        #confetti-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }
    </style>
</head>
<body class="overflow-hidden min-h-screen flex flex-col justify-between select-none">

    <!-- 背景紙花畫布 -->
    <canvas id="confetti-canvas"></canvas>

    <!-- 頂部狀態列 -->
    <header class="p-4 flex justify-between items-center bg-white/70 backdrop-blur-md shadow-sm z-10">
        <div class="flex items-center gap-3">
            <span class="text-4xl">👑</span>
            <h1 class="text-2xl md:text-3xl font-extrabold text-amber-500 tracking-wider" id="header-title">魔法數字樂園</h1>
        </div>
        <!-- 星星獎勵 -->
        <div class="flex items-center bg-amber-100 px-4 py-2 rounded-full border-2 border-amber-300">
            <span class="text-2xl mr-2">⭐</span>
            <span id="star-count" class="text-2xl font-bold text-amber-600">0</span>
        </div>
    </header>

    <!-- 遊戲主畫面 -->
    <main class="flex-grow flex flex-col items-center justify-center p-4 relative w-full">
        
        <!-- 大門選單 (首頁) -->
        <div id="home-screen" class="flex flex-col items-center max-w-md w-full gap-5 text-center z-10 overflow-y-auto max-h-[80vh] py-4">
            <div class="float-item text-7xl mb-2">🦁🐰🐯🍇🥑</div>
            <h2 class="text-3xl md:text-4xl font-black text-emerald-600 mb-1" id="menu-title">終極數字大挑戰！</h2>
            <p class="text-lg text-gray-600 mb-2 font-bold" id="menu-subtitle">雙語切換新登場，快來挑戰：</p>
            
            <button onclick="startGame('count')" class="w-full bg-gradient-to-r from-pink-400 to-rose-400 hover:from-pink-500 hover:to-rose-500 text-white text-2xl font-bold py-5 px-8 rounded-3xl shadow-lg border-b-8 border-rose-600 transform transition active:scale-95 flex items-center justify-center gap-4">
                <span class="text-4xl">🍓</span>
                <span class="text-left">
                    <span class="block text-xl font-black" id="btn-mode1-title">1. 水果大混和 (超難🔥)</span>
                    <span class="block text-xs opacity-90 font-normal" id="btn-mode1-desc">多種水果混和，不規則散落點數！</span>
                </span>
            </button>
            
            <button onclick="startGame('balloon')" class="w-full bg-gradient-to-r from-sky-400 to-blue-400 hover:from-sky-500 hover:to-blue-500 text-white text-2xl font-bold py-5 px-8 rounded-3xl shadow-lg border-b-8 border-blue-600 transform transition active:scale-95 flex items-center justify-center gap-4">
                <span class="text-4xl">🎈</span>
                <span class="text-left">
                    <span class="block text-xl font-black" id="btn-mode2-title">2. 數字氣球碰！</span>
                    <span class="block text-xs opacity-90 font-normal" id="btn-mode2-desc">氣球飛更快，挑戰 1 ~ 10 快速反應！</span>
                </span>
            </button>

            <button onclick="startGame('compare')" class="w-full bg-gradient-to-r from-amber-400 to-orange-400 hover:from-amber-50 hover:to-orange-500 text-white text-2xl font-bold py-5 px-8 rounded-3xl shadow-lg border-b-8 border-orange-600 transform transition active:scale-95 flex items-center justify-center gap-4">
                <span class="text-4xl">⚖️</span>
                <span class="text-left">
                    <span class="block text-xl font-black" id="btn-mode3-title">3. 糖果誰最多？</span>
                    <span class="block text-xs opacity-90 font-normal" id="btn-mode3-desc">比一比，哪一邊的東西比較多！</span>
                </span>
            </button>
        </div>

        <!-- 遊戲 1: 水果大混和 -->
        <div id="count-game" class="hidden w-full max-w-4xl flex flex-col items-center gap-4 z-10">
            <div class="text-center w-full px-4 flex flex-col items-center">
                <!-- 題目顯示框：加上了重播問題按鈕 -->
                <div class="flex items-center justify-center gap-3 bg-white/95 px-6 py-4 rounded-3xl shadow-md border-2 border-pink-200 mb-2 max-w-2xl w-full">
                    <button onclick="replayQuestion()" class="bg-rose-500 hover:bg-rose-600 text-white p-3 rounded-full shadow-md active:scale-95 transition flex items-center justify-center text-2xl" title="重播聲音" id="replay-btn">
                        🔊
                    </button>
                    <h3 class="text-xl md:text-2xl font-black text-rose-600 leading-normal" id="count-instruction">
                        載入中...
                    </h3>
                </div>
                <div class="flex justify-center gap-4 text-xs font-bold text-gray-500">
                    <span id="help-count-tip">💡 點擊「對的水果」會幫你數數</span>
                    <span class="text-orange-500" id="help-time-tip">⏱️ 答對越快，星星加乘越多！</span>
                </div>
            </div>

            <!-- 不規則水果擺放區 (定義高度 relative) -->
            <div id="candy-container" class="bg-white/90 rounded-3xl border-4 border-dashed border-rose-300 h-[300px] md:h-[370px] w-full max-w-2xl relative shadow-inner overflow-hidden">
                <!-- 動態不規則加入水果 (經由網格算法，絕對不重疊) -->
            </div>

            <!-- 答案按鈕區 -->
            <div id="count-options" class="grid grid-cols-4 gap-3 w-full max-w-lg">
                <!-- 動態加入超大數字按鈕 -->
            </div>
        </div>

        <!-- 遊戲 2: 數字氣球碰 -->
        <div id="balloon-game" class="hidden w-full h-full flex flex-col items-center justify-between absolute inset-0 z-10 p-6 overflow-hidden">
            <div class="text-center bg-white/90 p-4 rounded-2xl shadow-md border-2 border-sky-300 max-w-md w-full flex justify-center items-center gap-3">
                <button onclick="replayQuestion()" class="bg-sky-500 hover:bg-sky-600 text-white p-2.5 rounded-full shadow-sm active:scale-95 transition text-xl">
                    🔊
                </button>
                <h3 class="text-2xl md:text-3xl font-black text-sky-600">
                    <span id="balloon-find-text">請找出數字：</span><span id="target-number-display" class="text-5xl font-extrabold text-rose-500 underline ml-1">3</span>
                </h3>
            </div>

            <!-- 氣球活動區 -->
            <div id="balloon-area" class="flex-grow w-full relative overflow-hidden">
                <!-- 氣球會從底下飄上來 -->
            </div>
        </div>

        <!-- 遊戲 3: 糖果誰最多？ -->
        <div id="compare-game" class="hidden w-full max-w-4xl flex flex-col items-center gap-6 z-10">
            <div class="text-center flex flex-col items-center">
                <div class="flex items-center justify-center gap-3 bg-white/90 px-6 py-3 rounded-2xl shadow-md border-2 border-amber-200 mb-2">
                    <button onclick="replayQuestion()" class="bg-amber-500 hover:bg-amber-600 text-white p-2.5 rounded-full shadow-sm active:scale-95 transition text-xl">
                        🔊
                    </button>
                    <h3 class="text-2xl md:text-3xl font-black text-amber-600" id="compare-instruction">哪一邊的點心比較多呢？</h3>
                </div>
                <p class="text-sm text-gray-500 font-bold" id="compare-subinstruction">點選數量比較多的那一邊！</p>
            </div>

            <!-- 左右對比區域 -->
            <div class="grid grid-cols-2 gap-6 w-full max-w-2xl px-2">
                <!-- 左邊卡片 -->
                <button id="compare-left" onclick="checkCompareAnswer('left')" class="bg-white/90 p-4 md:p-6 rounded-3xl border-4 border-sky-300 hover:border-sky-400 shadow-lg active:scale-95 transition flex flex-col items-center justify-between min-h-[260px] cursor-pointer relative">
                    <div id="compare-left-items" class="relative w-full flex-grow min-h-[140px] p-2 bg-sky-50/50 rounded-2xl overflow-hidden"></div>
                    <div class="text-xl font-black text-sky-600 mt-3" id="label-left">左邊</div>
                </button>

                <!-- 右邊卡片 -->
                <button id="compare-right" onclick="checkCompareAnswer('right')" class="bg-white/90 p-4 md:p-6 rounded-3xl border-4 border-pink-300 hover:border-pink-400 shadow-lg active:scale-95 transition flex flex-col items-center justify-between min-h-[260px] cursor-pointer relative">
                    <div id="compare-right-items" class="relative w-full flex-grow min-h-[140px] p-2 bg-pink-50/50 rounded-2xl overflow-hidden"></div>
                    <div class="text-xl font-black text-pink-600 mt-3" id="label-right">右邊</div>
                </button>
            </div>
        </div>

        <!-- 成功/讚美與星星計分結算視窗 -->
        <div id="success-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50">
            <div class="bg-white p-6 md:p-8 rounded-3xl border-8 border-amber-300 text-center max-w-md w-full shadow-2xl transform transition scale-95 relative overflow-hidden">
                <!-- 可愛彩帶背景裝飾 -->
                <div class="absolute -top-10 -left-10 text-4xl opacity-20">🌸🎉🍰</div>
                <div class="absolute -bottom-10 -right-10 text-4xl opacity-20">🎁🌟🌈</div>

                <div class="text-6xl mb-2 animate-bounce">👑💖🎉</div>
                <h4 class="text-3xl font-black text-emerald-500 mb-1" id="modal-great-job">你好棒！！</h4>
                <p class="text-lg text-gray-600 font-bold mb-3" id="modal-subtitle">挑戰成功囉！</p>
                
                <!-- 精緻的成績結算卡片 -->
                <div class="bg-gradient-to-r from-amber-50 to-orange-50 p-4 rounded-2xl border-2 border-amber-200 mb-4 text-left">
                    <h5 class="text-center font-black text-amber-800 text-md border-b border-amber-200 pb-2 mb-2" id="report-title">✨ 本關卡挑戰報告 ✨</h5>
                    <div class="space-y-2 text-sm md:text-base font-bold text-gray-700">
                        <div class="flex justify-between">
                            <span id="report-label-time">⏱️ 答對時間：</span>
                            <span id="stat-time" class="text-rose-500 font-black">2.5 秒</span>
                        </div>
                        <div class="flex justify-between">
                            <span id="report-label-base">⭐ 題目基本星數：</span>
                            <span id="stat-base" class="text-blue-500">2 顆 (雙重目標挑戰)</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span id="report-label-speed">⚡ 速度加成倍率：</span>
                            <span id="stat-multiplier" class="bg-orange-400 text-white text-xs px-2 py-0.5 rounded-full font-black animate-pulse">2x (超神速!)</span>
                        </div>
                        <div class="flex justify-between border-t border-dashed border-amber-200 pt-2 text-lg font-black text-amber-600">
                            <span id="report-label-earned">🎁 本次獲得：</span>
                            <span id="stat-earned" class="text-2xl text-orange-500">+4 顆星星！</span>
                        </div>
                    </div>
                </div>

                <!-- 突出顯示總星星數 -->
                <div class="mb-4 text-center">
                    <p class="text-xs text-amber-700 font-bold uppercase tracking-wider mb-1" id="report-total-stars">🎒 目前累積總星星</p>
                    <div class="flex items-center justify-center gap-2">
                        <span class="text-3xl animate-pulse">⭐</span>
                        <span id="modal-star-count" class="text-4xl font-black text-amber-500">0</span>
                        <span class="text-lg font-bold text-gray-500" id="report-unit">顆</span>
                    </div>
                    <!-- 星星進度條小圖示 -->
                    <div id="stars-row" class="flex justify-center gap-1 mt-2 text-lg h-7 overflow-hidden"></div>
                </div>

                <!-- 暫停 / 恢復自動前進下一關的控制按鈕 -->
                <button id="pause-autonext-btn" onclick="toggleAutoNextPause()" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-extrabold py-2 px-4 rounded-2xl shadow-md transition text-sm mb-3">
                    ⏸️ 暫停自動下一題
                </button>

                <!-- 手動前進按鈕 (會動態附帶倒數顯示) -->
                <button onclick="triggerManualNext()" class="w-full bg-gradient-to-r from-amber-400 to-orange-400 hover:from-amber-50 hover:to-orange-500 text-white font-extrabold text-xl py-3.5 rounded-2xl border-b-4 border-orange-600 active:scale-95 transition" id="btn-next">
                    下一題 ➔
                </button>
            </div>
        </div>

    </main>

    <!-- 底部控制列 -->
    <footer class="p-4 flex justify-between items-center bg-white/70 backdrop-blur-md shadow-inner z-10 gap-2">
        <button id="back-home" onclick="goHome()" class="hidden bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-5 rounded-full text-lg shadow active:scale-95 transition shrink-0">
            🏠 
        </button>
        <div class="flex gap-2">
            <!-- 語系切換按鈕 -->
            <button onclick="toggleLang()" id="lang-btn" class="bg-sky-500 hover:bg-sky-600 text-white font-black py-2.5 px-4 rounded-full shadow active:scale-95 transition text-base flex items-center justify-center">
                🌐 English / 繁中
            </button>
            <!-- 語音切換按鈕 -->
            <button onclick="toggleVoice()" id="voice-btn" class="bg-amber-400 hover:bg-amber-500 text-white font-bold p-2.5 rounded-full shadow active:scale-95 transition flex items-center justify-center text-lg">
                🔊
            </button>
        </div>
    </footer>

        // Web Audio API
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function playSound(type) {
            try {
                if (!audioCtx) audioCtx = new AudioContext();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                const now = audioCtx.currentTime;

                if (type === 'pop') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(850, now);
                    osc.frequency.exponentialRampToValueAtTime(120, now + 0.12);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
                    osc.start(now);
                    osc.stop(now + 0.12);
                } else if (type === 'correct') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.setValueAtTime(659.25, now + 0.08); // E5
                    osc.frequency.setValueAtTime(783.99, now + 0.16); // G5
                    osc.frequency.setValueAtTime(1046.50, now + 0.24); // C6
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
                    osc.start(now);
                    osc.stop(now + 0.45);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(170, now);
                    osc.frequency.linearRampToValueAtTime(110, now + 0.25);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now);
                    osc.stop(now + 0.25);
                } else if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(580, now);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.07);
                    osc.start(now);
                    osc.stop(now + 0.07);
                } else if (type === 'magic') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(450, now);
                    osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
                    gain.gain.setValueAtTime(0.12, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                }
            } catch (e) {
                console.log("Audio Context Error");
            }
        }

        // --- 紙花特效 ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let confetti = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function createConfetti() {
            confetti = [];
            const colors = ['#FFC107', '#FF5722', '#E91E63', '#4CAF50', '#00BCD4', '#9C27B0'];
            for (let i = 0; i < 60; i++) {
                confetti.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 12 + 8,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    speedX: Math.random() * 4 - 2,
                    speedY: Math.random() * 5 + 5,
                    rotation: Math.random() * 360,
                    rotationSpeed: Math.random() * 10 - 5
                });
            }
        }

        let confettiActive = false;
        function updateConfetti() {
            if (!confettiActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            confetti.forEach(p => {
                p.y += p.speedY;
                p.x += p.speedX;
                p.rotation += p.rotationSpeed;
                if (p.y < canvas.height) {
                    active = true;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                }
            });
            if (active) {
                requestAnimationFrame(updateConfetti);
            } else {
                confettiActive = false;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        function triggerConfetti() {
            confettiActive = true;
            createConfetti();
            updateConfetti();
        }

        // --- 遊戲 1: 水果大混和 (高達12種水果混和、安全網格防疊演算法、不規則角度擺放、刁鑽答案) ---
        const ALL_FRUITS = {
            '🍓': { zh: '草莓', en: 'Strawberry' },
            '🍎': { zh: '蘋果', en: 'Apple' },
            '🍉': { zh: '西瓜', en: 'Watermelon' },
            '🍌': { zh: '香蕉', en: 'Banana' },
            '🍇': { zh: '葡萄', en: 'Grape' },
            '🍒': { zh: '櫻桃', en: 'Cherry' },
            '🍍': { zh: '鳳梨', en: 'Pineapple' },
            '🍊': { zh: '橘子', en: 'Orange' },
            '🍋': { zh: '檸檬', en: 'Lemon' },
            '🍑': { zh: '桃子', en: 'Peach' },
            '🥑': { zh: '酪梨', en: 'Avocado' },
            '🥝': { zh: '奇異果', en: 'Kiwi' }
        };
        
        let currentLevelCorrectCount = 0;
        let countGameTappedTarget = 0;
        let targetFruitEmojis = [];

        function initCountLevel() {
            const container = document.getElementById('candy-container');
            const optionsDiv = document.getElementById('count-options');
            container.innerHTML = '';
            optionsDiv.innerHTML = '';
            countGameTappedTarget = 0;

            const fruitKeys = Object.keys(ALL_FRUITS).sort(() => Math.random() - 0.5);
            // 隨機選 2 到 3 種水果混和
            const numTypes = Math.random() < 0.5 ? 2 : 3;
            const activeFruits = fruitKeys.slice(0, numTypes);

            let mixPool = [];
            let fruitCounts = {};

            // 放入水果 (每種 2 ~ 5 顆，總體可達 14 顆以確保網格容納)
            activeFruits.forEach(emoji => {
                const count = Math.floor(Math.random() * 4) + 2; // 2 ~ 5 顆
                fruitCounts[emoji] = count;
                for (let i = 0; i < count; i++) {
                    mixPool.push(emoji);
                }
            });

            // 隨機打亂水果順序
            mixPool.sort(() => Math.random() - 0.5);

            // 決定問 1 種還是 2 種目標
            const isDoubleTarget = Math.random() < 0.55 && activeFruits.length >= 2;
            let questionHTML = "";

            if (isDoubleTarget) {
                targetFruitEmojis = [activeFruits[0], activeFruits[1]];
                currentLevelCorrectCount = fruitCounts[activeFruits[0]] + fruitCounts[activeFruits[1]];
                
                const f1 = ALL_FRUITS[activeFruits[0]][currentLang];
                const f2 = ALL_FRUITS[activeFruits[1]][currentLang];
                
                questionHTML = TRANSLATIONS[currentLang].doubleTargetQuestion(activeFruits[0], f1, activeFruits[1], f2);
                lastSpokenText = TRANSLATIONS[currentLang].doubleTargetSpeech(f1, f2);
            } else {
                targetFruitEmojis = [activeFruits[0]];
                currentLevelCorrectCount = fruitCounts[activeFruits[0]];
                
                const f1 = ALL_FRUITS[activeFruits[0]][currentLang];
                
                questionHTML = TRANSLATIONS[currentLang].singleTargetQuestion(activeFruits[0], f1);
                lastSpokenText = TRANSLATIONS[currentLang].singleTargetSpeech(f1);
            }

            document.getElementById('count-instruction').innerHTML = questionHTML;
            speakText(lastSpokenText);

            // --- 📌 核心防疊算法：建立一個 6x4 (24個) 可靠網格格子 ---
            const numCols = 6;
            const numRows = 4;
            let gridSlots = [];
            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    gridSlots.push({ r, c });
                }
            }
            // 隨機洗牌格子
            gridSlots.sort(() => Math.random() - 0.5);

            // 根據格子渲染水果
            mixPool.forEach((emoji, index) => {
                if (index >= gridSlots.length) return; // 容錯保護

                const slot = gridSlots[index];
                const fruitBtn = document.createElement('button');
                // 控制水果尺寸在網格內
                fruitBtn.className = "absolute text-5xl md:text-6xl focus:outline-none transform transition active:scale-125 duration-150 cursor-pointer filter drop-shadow-md select-none";
                fruitBtn.innerHTML = emoji;
                fruitBtn.dataset.tapped = "false";
                
                // 網格基礎佔比 (加上 10% 邊緣留白)
                const baseLeft = 10 + (slot.c * (80 / (numCols - 1)));
                const baseTop = 15 + (slot.r * (70 / (numRows - 1)));
                
                // 額外加上隨機「小微調（Jitter）」以防排列太死板，但絕不超出隔鄰干涉範圍 (限制在 ±4.5% 內)
                const jitterX = (Math.random() * 9) - 4.5;
                const jitterY = (Math.random() * 9) - 4.5;
                
                const finalLeft = baseLeft + jitterX;
                const finalTop = baseTop + jitterY;
                const randomRot = Math.random() * 60 - 30; // 隨機旋轉 -30deg ~ 30deg
                
                fruitBtn.style.left = `${finalLeft}%`;
                fruitBtn.style.top = `${finalTop}%`;
                fruitBtn.style.transform = `rotate(${randomRot}deg)`;

                fruitBtn.onclick = (e) => {
                    e.preventDefault();
                    if (fruitBtn.dataset.tapped === "false") {
                        const isTarget = targetFruitEmojis.includes(emoji);
                        
                        if (isTarget) {
                            countGameTappedTarget++;
                            fruitBtn.dataset.tapped = "true";
                            fruitBtn.classList.add('opacity-25', 'scale-75');
                            playSound('pop');
                            
                            const words = NUM_WORDS[currentLang];
                            if (countGameTappedTarget <= words.length) {
                                // 🔊 單個點數發音也套用「屬」的優化邏輯，防止在點擊時唸成「ㄕㄨˋ」
                                let numberWord = words[countGameTappedTarget - 1];
                                speakText(numberWord);
                            }
                        } else {
                            playSound('magic');
                            const fruitName = ALL_FRUITS[emoji][currentLang];
                            speakText(TRANSLATIONS[currentLang].notTargetFruit(fruitName));
                            
                            fruitBtn.classList.add('animate-bounce');
                            setTimeout(() => fruitBtn.classList.remove('animate-bounce'), 400);
                        }
                    }
                };
                container.appendChild(fruitBtn);
            });

            // 🧠 鄰接數刁鑽干擾答案算法
            let choices = [currentLevelCorrectCount];
            const distractorOffsets = [1, -1, 2, -2, 3, -3];
            
            for (let offset of distractorOffsets) {
                if (choices.length >= 4) break;
                let potentialWrong = currentLevelCorrectCount + offset;
                if (potentialWrong > 0 && !choices.includes(potentialWrong)) {
                    choices.push(potentialWrong);
                }
            }

            while (choices.length < 4) {
                let fallbackWrong = Math.floor(Math.random() * 15) + 1;
                if (!choices.includes(fallbackWrong)) {
                    choices.push(fallbackWrong);
                }
            }
            
            choices.sort(() => Math.random() - 0.5);

            const colors = [
                'from-amber-400 to-yellow-400 hover:from-amber-500 hover:to-yellow-500 border-yellow-600 text-yellow-950',
                'from-emerald-400 to-green-400 hover:from-emerald-500 hover:to-green-500 border-green-600 text-green-950',
                'from-pink-400 to-purple-400 hover:from-pink-500 hover:to-purple-500 border-purple-600 text-purple-950',
                'from-sky-400 to-indigo-400 hover:from-sky-500 hover:to-indigo-500 border-indigo-600 text-indigo-950'
            ];

            choices.forEach((num, index) => {
                const btn = document.createElement('button');
                btn.className = `w-full bg-gradient-to-r ${colors[index]} text-4xl md:text-5xl font-black py-4 rounded-3xl border-b-8 shadow-lg transform transition active:scale-95 flex flex-col items-center justify-center`;
                btn.innerHTML = `${num}`;
                btn.onclick = () => checkCountAnswer(num, btn, isDoubleTarget);
                optionsDiv.appendChild(btn);
            });

            levelStartTime = Date.now();
        }

        function checkCountAnswer(selected, buttonElement, isDoubleTarget) {
            if (selected === currentLevelCorrectCount) {
                buttonElement.classList.add('bounce-active');
                showSuccess(isDoubleTarget ? 2 : 1, isDoubleTarget);
            } else {
                playSound('wrong');
                buttonElement.classList.add('shake-active');
                setTimeout(() => buttonElement.classList.remove('shake-active'), 400);
                speakText(TRANSLATIONS[currentLang].wrongAnswerSpeech);
            }
        }


        // --- 遊戲 2: 數字氣球碰！ (1 ~ 10 範圍 + 計時) ---
        let targetNumber = 0;
        let balloonTimer = null;
        const balloonColors = [
            'from-red-400 to-rose-400 border-rose-500',
            'from-sky-400 to-blue-400 border-blue-500',
            'from-green-400 to-emerald-400 border-emerald-500',
            'from-yellow-400 to-amber-400 border-amber-500',
            'from-purple-400 to-fuchsia-400 border-fuchsia-500',
            'from-orange-400 to-amber-500 border-amber-600'
        ];

        function initBalloonLevel() {
            clearInterval(balloonTimer);
            const area = document.getElementById('balloon-area');
            area.innerHTML = '';

            targetNumber = Math.floor(Math.random() * 10) + 1;
            document.getElementById('target-number-display').innerText = targetNumber;

            lastSpokenText = TRANSLATIONS[currentLang].balloonTargetSpeech(targetNumber);
            speakText(lastSpokenText);

            createBalloon();
            balloonTimer = setInterval(createBalloon, 1400); 

            levelStartTime = Date.now();
        }

        function createBalloon() {
            if (currentGameMode !== 'balloon') {
                clearInterval(balloonTimer);
                return;
            }

            const area = document.getElementById('balloon-area');
            const balloon = document.createElement('div');
            
            const isTarget = Math.random() < 0.35;
            let balloonNum = targetNumber;
            if (!isTarget) {
                balloonNum = Math.floor(Math.random() * 10) + 1;
                if (balloonNum === targetNumber) {
                    balloonNum = (targetNumber % 10) + 1;
                }
            }

            const colorClass = balloonColors[Math.floor(Math.random() * balloonColors.length)];
            const randomX = Math.random() * 78 + 6; 
            const randomSize = Math.floor(Math.random() * 25) + 95; 

            balloon.className = `balloon flex flex-col items-center justify-center rounded-full bg-gradient-to-t ${colorClass} border-4 shadow-lg select-none`;
            balloon.style.left = `${randomX}%`;
            balloon.style.width = `${randomSize}px`;
            balloon.style.height = `${randomSize * 1.22}px`;
            
            const string = document.createElement('div');
            string.className = "w-1 h-12 bg-gray-400 absolute -bottom-10 left-1/2 transform -translate-x-1/2 rounded-full";
            balloon.appendChild(string);

            const text = document.createElement('span');
            text.className = "text-white text-4xl md:text-5xl font-black drop-shadow-md z-10 select-none pointer-events-none";
            text.innerText = balloonNum;
            balloon.appendChild(text);

            balloon.onclick = (e) => {
                e.preventDefault();
                popBalloon(balloon, balloonNum);
            };

            balloon.addEventListener('animationend', () => {
                balloon.remove();
            });

            area.appendChild(balloon);
        }

        function popBalloon(balloonElement, num) {
            if (num === targetNumber) {
                playSound('pop');
                balloonElement.style.animationPlayState = 'paused';
                balloonElement.innerHTML = '<span class="text-6xl animate-ping">✨</span>';
                
                setTimeout(() => {
                    balloonElement.remove();
                }, 200);

                clearInterval(balloonTimer);
                const remaining = document.querySelectorAll('.balloon');
                remaining.forEach(b => b.style.pointerEvents = 'none');

                showSuccess(1, false);
            } else {
                playSound('wrong');
                balloonElement.classList.add('shake-active');
                setTimeout(() => balloonElement.classList.remove('shake-active'), 400);
                speakText(TRANSLATIONS[currentLang].balloonWrongSpeech(num));
            }
        }


        // --- 遊戲 3: 糖果誰最多？ (左右不規則擺放) ---
        let correctSide = ''; 

        function initCompareLevel() {
            const leftContainer = document.getElementById('compare-left-items');
            const rightContainer = document.getElementById('compare-right-items');
            leftContainer.innerHTML = '';
            rightContainer.innerHTML = '';

            let leftCount = Math.floor(Math.random() * 7) + 1;
            let rightCount = Math.floor(Math.random() * 7) + 1;
            while (leftCount === rightCount) {
                rightCount = Math.floor(Math.random() * 7) + 1;
            }

            correctSide = leftCount > rightCount ? 'left' : 'right';

            const emojis = Object.keys(ALL_FRUITS);
            const leftEmoji = emojis[Math.floor(Math.random() * (emojis.length / 2))];
            const rightEmoji = emojis[Math.floor(Math.random() * (emojis.length / 2)) + Math.floor(emojis.length / 2)];

            // 左右兩側網格防重疊配置 (4格安全槽)
            const sideSlots = [
                {x: 20, y: 20}, {x: 65, y: 20},
                {x: 20, y: 65}, {x: 65, y: 65},
                {x: 42, y: 42}, {x: 20, y: 42}, {x: 65, y: 42}
            ];

            // 渲染左邊水果（隨機打亂網格點配置，不重疊）
            let leftSlots = [...sideSlots].sort(() => Math.random() - 0.5);
            for (let i = 0; i < leftCount; i++) {
                if (i >= leftSlots.length) break;
                const el = document.createElement('span');
                el.className = 'absolute text-4xl filter drop-shadow-sm transition transform hover:scale-110 select-none';
                el.innerText = leftEmoji;
                
                const pt = leftSlots[i];
                const rx = pt.x + (Math.random() * 8 - 4);
                const ry = pt.y + (Math.random() * 8 - 4);
                const rr = Math.random() * 40 - 20;

                el.style.left = `${rx}%`;
                el.style.top = `${ry}%`;
                el.style.transform = `rotate(${rr}deg)`;
                
                leftContainer.appendChild(el);
            }

            // 渲染右邊水果
            let rightSlots = [...sideSlots].sort(() => Math.random() - 0.5);
            for (let i = 0; i < rightCount; i++) {
                if (i >= rightSlots.length) break;
                const el = document.createElement('span');
                el.className = 'absolute text-4xl filter drop-shadow-sm transition transform hover:scale-110 select-none';
                el.innerText = rightEmoji;
                
                const pt = rightSlots[i];
                const rx = pt.x + (Math.random() * 8 - 4);
                const ry = pt.y + (Math.random() * 8 - 4);
                const rr = Math.random() * 40 - 20;

                el.style.left = `${rx}%`;
                el.style.top = `${ry}%`;
                el.style.transform = `rotate(${rr}deg)`;
                
                rightContainer.appendChild(el);
            }

            lastSpokenText = TRANSLATIONS[currentLang].compareTargetSpeech;
            speakText(lastSpokenText);

            levelStartTime = Date.now();
        }

        function checkCompareAnswer(clickedSide) {
            const leftCard = document.getElementById('compare-left');
            const rightCard = document.getElementById('compare-right');

            if (clickedSide === correctSide) {
                if (clickedSide === 'left') {
                    leftCard.classList.add('bounce-active');
                    setTimeout(() => leftCard.classList.remove('bounce-active'), 500);
                } else {
                    rightCard.classList.add('bounce-active');
                    setTimeout(() => rightCard.classList.remove('bounce-active'), 500);
                }
                showSuccess(1, false);
            } else {
                playSound('wrong');
                const wrongCard = clickedSide === 'left' ? leftCard : rightCard;
                wrongCard.classList.add('shake-active');
                setTimeout(() => wrongCard.classList.remove('shake-active'), 400);

                speakText(TRANSLATIONS[currentLang].compareWrongSpeech);
            }
        }

        // 啟動首頁語音與翻譯
        window.onload = () => {
            updateStaticText();
            setTimeout(() => {
                speakText(TRANSLATIONS[currentLang].welcomeSpeech);
            }, 500);
        };
    </script>
</body>
</html>
